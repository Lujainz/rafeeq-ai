<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>رفيق</title>
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body>

  <h1>رفيق</h1>
  <p class="subtitle">مساعدك الصوتي الذكي</p>

  <button id="mic-btn" title="اضغط واستمر للتحدث" disabled>
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1
               14.93V18H9v2h6v-2h-2v-2.07A7.001 7.001 0 0 0 19 11h-2a5
               5 0 0 1-10 0H5a7.001 7.001 0 0 0 6 6.93z"/>
    </svg>
  </button>

  <p id="status">جاري الاتصال...</p>
  <p id="instruction">أفلت الزر لإرسال رسالتك</p>

  <div class="bubble-container" id="bubbles"></div>

  <!-- load order matters: config → identity → ui → audio → socket → app -->
 <script src="/assets/js/config.js"></script>
<script src="/assets/js/identity.js"></script>
<script src="/assets/js/ui.js"></script>
<script src="/assets/js/audio.js"></script>
<script src="/assets/js/socket.js"></script>
  <script>
    // app.js — wires everything together, the only place modules touch each other
    Socket.connect();

    UI.micBtn.addEventListener('mousedown', onMicDown);
    UI.micBtn.addEventListener('mouseup',   onMicUp);
    UI.micBtn.addEventListener('touchstart', (e) => { e.preventDefault(); onMicDown(); });
    UI.micBtn.addEventListener('touchend',   (e) => { e.preventDefault(); onMicUp();   });

    function onMicDown() {
      if (!Socket.isOpen()) {
        UI.setStatus('جاري الاتصال، انتظر لحظة...');
        return;
      }
      Audio_.resetQueue();
      UI.resetRafeeqBubble();
      Audio_.startRecording((blob) => {
        blob.arrayBuffer().then(buf => Socket.send(buf));
      });
    }

    function onMicUp() {
      Audio_.stopRecording();
    }
  </script>

</body>
</html>
