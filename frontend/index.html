<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>رفيق</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body>

  <div class="app">

    <!-- Mic section — fixed height, always visible -->
    <section class="mic-section">

      <!-- waveform — appears above mic during speaking -->
      <div class="waveform" id="waveform" aria-hidden="true">
        <span class="wbar"></span>
        <span class="wbar"></span>
        <span class="wbar"></span>
        <span class="wbar"></span>
        <span class="wbar"></span>
        <span class="wbar"></span>
        <span class="wbar"></span>
      </div>

      <!-- mic button with rings -->
      <div class="mic-wrap" id="mic-wrap">
        <div class="ring r1"></div>
        <div class="ring r2"></div>
        <div class="ring r3"></div>
        <button
          id="mic-btn"
          class="mic-btn"
          disabled
          aria-label="اضغط للتحدث"
        >
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="9" y="2" width="6" height="12" rx="3" fill="white"/>
            <path d="M5 11a7 7 0 0 0 14 0" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
            <line x1="12" y1="18" x2="12" y2="22" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
            <line x1="8.5" y1="22" x2="15.5" y2="22" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <p id="status" class="status-text">جاري الاتصال...</p>

    </section>

    <!-- Chat section — takes remaining height, scrollable inside -->
    <section class="chat-section">
      <div class="chat-box" id="bubbles">
        <!-- messages injected by ui.js -->
      </div>
    </section>

  </div>

  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/identity.js"></script>
  <script src="/assets/js/ui.js"></script>
  <script src="/assets/js/audio.js"></script>
  <script src="/assets/js/socket.js"></script>
  <script>
    Socket.connect();

    UI.micBtn.addEventListener('mousedown', onMicDown);
    UI.micBtn.addEventListener('mouseup',   onMicUp);
    UI.micBtn.addEventListener('touchstart', (e) => { e.preventDefault(); onMicDown(); });
    UI.micBtn.addEventListener('touchend',   (e) => { e.preventDefault(); onMicUp();   });

    function onMicDown() {
      if (!Socket.isOpen()) {
        UI.setStatus('جاري الاتصال، انتظر لحظة...');
        return;
      }
      Audio_.resetQueue();
      UI.resetRafeeqBubble();
      Audio_.startRecording((blob) => {
        blob.arrayBuffer().then(buf => Socket.send(buf));
      });
    }

    function onMicUp() {
      Audio_.stopRecording();
    }
  </script>

</body>
</html>
